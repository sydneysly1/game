<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joey's Birthday Zip Spell</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap');

  :root{
    --maroon: #6e0b0b;
    --maroon-deep: #3a0303;
    --gold: #d4af37;
    --gold-light: #f5dd8f;
    --parchment: #f4e8cc;
    --parchment-dark: #e2cea3;
    --ink: #2a1608;
    --night: #1c0707;
    --cell: min(9.6vw, 40px);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    min-height: 100%;
    font-family: 'Cormorant Garamond', serif;
    color: var(--parchment);
    background:
      radial-gradient(ellipse at 50% -10%, #4a0d0d 0%, var(--night) 55%, #0c0202 100%);
    overflow-x: hidden;
  }

  .stars{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star{
    position: absolute;
    width: 3px; height: 3px;
    background: var(--gold-light);
    border-radius: 50%;
    opacity: 0.25;
    animation: twinkle 3.2s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%, 100%{ opacity: 0.15; transform: scale(1); }
    50%{ opacity: 0.9; transform: scale(1.6); }
  }

  .scene{
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 28px 16px 60px;
    text-align: center;
  }

  h1{
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(22px, 6vw, 34px);
    margin: 6px 0 4px;
    letter-spacing: 1px;
    background: linear-gradient(180deg, var(--gold-light), var(--gold) 60%, #a9791b);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 18px rgba(212,175,55,0.35);
  }

  .subtitle{
    font-size: clamp(14px, 3.6vw, 17px);
    color: var(--parchment-dark);
    font-style: italic;
    margin: 0 0 22px;
    line-height: 1.5;
  }

  /* ---------- PUZZLE STAGE ---------- */
  #puzzle-stage{
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #puzzle-stage.solved{
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
  }

  .candles-row{
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    width: calc(var(--cell) * 9 + 16px);
    margin: 0 auto;
    height: calc(var(--cell) * 0.85);
    padding: 0 8px;
  }
  .candle-slot{
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
  }
  .candle{
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }
  .candle .stick{
    width: 38%;
    height: 65%;
    background: linear-gradient(180deg, var(--parchment), var(--parchment-dark));
    border: 1px solid var(--maroon-deep);
    border-radius: 2px;
    margin: 0 auto;
  }
  .candle .flame{
    width: 10px;
    height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: #6b6b6b;
    margin: 0 auto -2px;
    opacity: 0.5;
    transition: background 0.4s ease, box-shadow 0.4s ease, opacity 0.4s ease;
  }

  .grid-wrap{
    position: relative;
    width: calc(var(--cell) * 9 + 16px);
    aspect-ratio: 9 / 8;
    margin: 6px auto 0;
    padding: 8px;
    background: linear-gradient(160deg, #2a0808, #150303);
    border: 3px solid var(--gold);
    border-radius: 14px;
    box-shadow: 0 0 0 1px rgba(212,175,55,0.25) inset, 0 10px 30px rgba(0,0,0,0.5);
    touch-action: none;
  }

  .grid{
    position: absolute;
    inset: 8px;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 3px;
  }

  .cell{
    position: relative;
    background: var(--parchment-dark);
    border: 1px solid rgba(58,3,3,0.4);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }
  .cell.visited{
    background: var(--gold-light);
  }

  .badge{
    width: 72%;
    height: 72%;
    border-radius: 50%;
    background: var(--maroon);
    color: var(--gold-light);
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    font-size: clamp(8px, 2.6vw, 13px);
    z-index: 2;
    transition: box-shadow 0.2s ease;
  }
  .cell.visited .badge{
    box-shadow: 0 0 10px 2px rgba(212,175,55,0.7);
  }

  .path-svg{
    position: absolute;
    inset: 8px;
    width: calc(100% - 16px);
    height: calc(100% - 16px);
    pointer-events: none;
    overflow: visible;
  }
  .path-line{
    fill: none;
    stroke: var(--gold);
    stroke-width: 0.3;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 0.18px var(--gold)) drop-shadow(0 0 6px rgba(212,175,55,0.85));
    opacity: 0.92;
  }
  .path-head{
    fill: var(--gold-light);
    filter: drop-shadow(0 0 6px var(--gold));
    animation: pulse-head 1.1s ease-in-out infinite;
  }
  @keyframes pulse-head{
    0%, 100%{ r: 0.45; opacity: 0.85; }
    50%{ r: 0.62; opacity: 1; }
  }

  .controls{
    margin-top: 18px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  button{
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--ink);
    background: linear-gradient(180deg, var(--gold-light), var(--gold));
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button:hover{ transform: translateY(-1px); box-shadow: 0 5px 14px rgba(0,0,0,0.5); }
  button:active{ transform: translateY(0); }

  /* ---------- CAKE STAGE ---------- */
  #cake-stage{
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.9s ease, transform 0.9s ease;
    z-index: 5;
    padding: 20px;
  }
  #cake-stage.show{
    opacity: 1;
    transform: scale(1);
  }
  #cake-stage[hidden]{ display: none; }

  #cake-stage .headline{
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(24px, 8vw, 46px);
    text-align: center;
    background: linear-gradient(180deg, var(--gold-light), var(--gold) 60%, #a9791b);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(212,175,55,0.45);
    margin: 0 0 18px;
  }
  #cake-stage .subline{
    font-style: italic;
    color: var(--parchment-dark);
    margin: -8px 0 22px;
    font-size: clamp(13px, 3.6vw, 17px);
    text-align: center;
  }

  .cake-svg{
    width: min(82vw, 340px);
    height: auto;
    overflow: visible;
  }
  .cake-flame{
    opacity: 0;
    transform-origin: center bottom;
    transition: opacity 0.4s ease;
  }
  .cake-flame.lit{
    opacity: 1;
    animation: flicker 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 6px #ffb454) drop-shadow(0 0 14px #ff7a1a);
  }
  @keyframes flicker{
    0%, 100%{ transform: scaleY(1) scaleX(1) rotate(0deg); }
    25%{ transform: scaleY(1.08) scaleX(0.95) rotate(-2deg); }
    50%{ transform: scaleY(0.94) scaleX(1.05) rotate(2deg); }
    75%{ transform: scaleY(1.05) scaleX(0.97) rotate(-1deg); }
  }

  .confetti-piece{
    position: fixed;
    top: -10px;
    width: 8px;
    height: 14px;
    opacity: 0.9;
    z-index: 6;
    animation: fall linear forwards;
  }
  @keyframes fall{
    0%{ transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100%{ transform: translateY(110vh) rotate(540deg); opacity: 0.3; }
  }

  .replay-btn{ margin-top: 22px; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="scene">
  <h1>Joey's Birthday Zip Spell</h1>
  <p class="subtitle">Trace one unbroken line from 1 to 11, filling every square of the cake, to cast the candle-lighting charm.</p>

  <div id="puzzle-stage">
    <div class="candles-row" id="candles"></div>
    <div class="grid-wrap">
      <svg class="path-svg" viewBox="0 0 9 8" preserveAspectRatio="none">
        <polyline class="path-line" id="pathLine" points=""></polyline>
        <circle class="path-head" id="pathHead" r="0.45" cx="-1" cy="-1"></circle>
      </svg>
      <div class="grid" id="grid"></div>
    </div>
    <div class="controls">
      <button id="resetBtn">Clear Path</button>
    </div>
  </div>
</div>

<div id="cake-stage" hidden>
  <div class="headline">Happy Birthday, Joey!</div>
  <div class="subline">The charm is complete — make a wish.</div>
  <svg class="cake-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
    <!-- plate -->
    <ellipse cx="120" cy="178" rx="105" ry="12" fill="#3a0303"/>
    <!-- bottom tier -->
    <rect x="15" y="110" width="210" height="60" rx="8" fill="#6e0b0b"/>
    <rect x="15" y="110" width="210" height="14" rx="6" fill="#d4af37"/>
    <!-- top tier -->
    <rect x="55" y="60" width="130" height="55" rx="8" fill="#8a1212"/>
    <rect x="55" y="60" width="130" height="13" rx="6" fill="#f5dd8f"/>
    <!-- drips -->
    <circle cx="55" cy="125" r="6" fill="#d4af37"/>
    <circle cx="100" cy="125" r="6" fill="#d4af37"/>
    <circle cx="145" cy="125" r="6" fill="#d4af37"/>
    <circle cx="190" cy="125" r="6" fill="#d4af37"/>
    <circle cx="65" cy="75" r="5" fill="#f5dd8f"/>
    <circle cx="120" cy="75" r="5" fill="#f5dd8f"/>
    <circle cx="175" cy="75" r="5" fill="#f5dd8f"/>

    <!-- candles -->
    <g id="cakeCandles">
      <g transform="translate(80,28)">
        <rect x="-2.5" y="0" width="5" height="34" fill="#f4e8cc"/>
        <ellipse class="cake-flame" cx="0" cy="-4" rx="5" ry="8" fill="#ffb454"/>
      </g>
      <g transform="translate(105,18)">
        <rect x="-2.5" y="0" width="5" height="44" fill="#f4e8cc"/>
        <ellipse class="cake-flame" cx="0" cy="-4" rx="5" ry="8" fill="#ffb454"/>
      </g>
      <g transform="translate(135,18)">
        <rect x="-2.5" y="0" width="5" height="44" fill="#f4e8cc"/>
        <ellipse class="cake-flame" cx="0" cy="-4" rx="5" ry="8" fill="#ffb454"/>
      </g>
      <g transform="translate(160,28)">
        <rect x="-2.5" y="0" width="5" height="34" fill="#f4e8cc"/>
        <ellipse class="cake-flame" cx="0" cy="-4" rx="5" ry="8" fill="#ffb454"/>
      </g>
    </g>
  </svg>
  <button class="replay-btn" id="replayBtn">Cast the Charm Again</button>
</div>

<script>
  // ---------- starfield ----------
  const starsEl = document.getElementById('stars');
  for(let i=0;i<40;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDelay = (Math.random()*3) + 's';
    starsEl.appendChild(s);
  }

  // ---------- candle decorations (unlit), above columns 0,2,5,7 of 9 ----------
  const candlesRow = document.getElementById('candles');
  const CANDLE_COLS = new Set([0,2,5,7]);
  for(let i=0;i<9;i++){
    const slot = document.createElement('div');
    slot.className = 'candle-slot';
    if(CANDLE_COLS.has(i)){
      slot.innerHTML = '<div class="candle"><div class="flame"></div><div class="stick"></div></div>';
    }
    candlesRow.appendChild(slot);
  }

  // ---------- grid setup ----------
  const ROWS = 8, COLS = 9;
  // index = r*COLS + c  -> checkpoint number
  const NUMBERS = {0:7, 3:8, 6:9, 23:10, 26:11, 37:6, 43:5, 45:4, 54:3, 63:1, 71:2};
  const MAX_NUM = 11;

  const gridEl = document.getElementById('grid');
  const cellEls = [];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const idx = r*COLS+c;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      if(NUMBERS[idx] !== undefined){
        const badge = document.createElement('div');
        badge.className = 'badge';
        badge.textContent = NUMBERS[idx];
        cell.appendChild(badge);
      }
      gridEl.appendChild(cell);
      cellEls.push(cell);
    }
  }

  let path = [];
  let lastNum = 0;
  let dragging = false;

  function keyOf(r,c){ return r*COLS+c; }
  function inPath(r,c){ return path.some(p=>p.r===r && p.c===c); }

  function recomputeLastNum(){
    let m = 0;
    for(const p of path){
      const n = NUMBERS[keyOf(p.r,p.c)];
      if(n) m = Math.max(m,n);
    }
    lastNum = m;
  }

  function tryExtend(r,c){
    if(r<0||r>=ROWS||c<0||c>=COLS) return false;

    if(path.length === 0){
      if(NUMBERS[keyOf(r,c)] === 1){
        path = [{r,c}];
        lastNum = 1;
        render();
      }
      return true;
    }

    const last = path[path.length-1];
    if(r===last.r && c===last.c) return true;

    // backtrack
    if(path.length >= 2){
      const prev = path[path.length-2];
      if(r===prev.r && c===prev.c){
        path.pop();
        recomputeLastNum();
        render();
        return true;
      }
    }

    // adjacency
    if(Math.abs(r-last.r) + Math.abs(c-last.c) !== 1) return false;
    if(inPath(r,c)) return false;

    const num = NUMBERS[keyOf(r,c)];
    if(num !== undefined && num !== lastNum+1) return false;

    path.push({r,c});
    if(num !== undefined) lastNum = num;
    render();
    checkWin();
    return true;
  }

  const pathLine = document.getElementById('pathLine');
  const pathHead = document.getElementById('pathHead');

  function render(){
    cellEls.forEach(cell=>{
      const r = +cell.dataset.r, c = +cell.dataset.c;
      cell.classList.toggle('visited', inPath(r,c));
    });
    if(path.length){
      const pts = path.map(p=>`${p.c+0.5},${p.r+0.5}`).join(' ');
      pathLine.setAttribute('points', pts);
      const head = path[path.length-1];
      pathHead.setAttribute('cx', head.c+0.5);
      pathHead.setAttribute('cy', head.r+0.5);
    } else {
      pathLine.setAttribute('points','');
      pathHead.setAttribute('cx','-1');
      pathHead.setAttribute('cy','-1');
    }
  }

  function checkWin(){
    if(path.length === ROWS*COLS && lastNum === MAX_NUM){
      setTimeout(celebrate, 250);
    }
  }

  // pointer handling
  gridEl.addEventListener('pointerdown', e=>{
    const cell = e.target.closest('.cell');
    if(!cell) return;
    e.preventDefault();
    dragging = true;
    tryExtend(+cell.dataset.r, +cell.dataset.c);
  });
  document.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cell = el && el.closest && el.closest('.cell');
    if(!cell) return;
    tryExtend(+cell.dataset.r, +cell.dataset.c);
  });
  document.addEventListener('pointerup', ()=>{ dragging = false; });
  document.addEventListener('pointercancel', ()=>{ dragging = false; });

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    path = [];
    lastNum = 0;
    render();
  });

  // ---------- celebration ----------
  function launchConfetti(){
    const colors = ['#d4af37','#f5dd8f','#6e0b0b','#f4e8cc'];
    for(let i=0;i<60;i++){
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random()*100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
      piece.style.animationDelay = (Math.random()*1.5) + 's';
      document.body.appendChild(piece);
      setTimeout(()=>piece.remove(), 6500);
    }
  }

  function celebrate(){
    document.getElementById('puzzle-stage').classList.add('solved');
    setTimeout(()=>{
      const cakeStage = document.getElementById('cake-stage');
      cakeStage.hidden = false;
      requestAnimationFrame(()=> cakeStage.classList.add('show'));
      launchConfetti();
      const flames = cakeStage.querySelectorAll('.cake-flame');
      flames.forEach((f,i)=> setTimeout(()=> f.classList.add('lit'), 500 + i*250));
    }, 650);
  }

  document.getElementById('replayBtn').addEventListener('click', ()=>{
    const cakeStage = document.getElementById('cake-stage');
    cakeStage.classList.remove('show');
    setTimeout(()=>{
      cakeStage.hidden = true;
      cakeStage.querySelectorAll('.cake-flame').forEach(f=>f.classList.remove('lit'));
      document.getElementById('puzzle-stage').classList.remove('solved');
      path = [];
      lastNum = 0;
      render();
    }, 700);
  });

  render();
</script>
</body>
</html>
